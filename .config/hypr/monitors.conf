# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,2

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.6

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# 1. External Monitor (Starts at the far left origin)
monitor = DP-2, 1920x1080@60, 0x0, 1.33

# 2. Primary Laptop Display (Placed explicitly to the right of DP-2)
# 1920 / 1.33 = ~1443 logical pixels wide. We place eDP-1 here so they stitch perfectly.
monitor = eDP-1, 1920x1200@60, 1443x0, 1.5

# 3. Dynamic Fallback Catch-All (Keep this at the bottom!)
monitor = , preferred, auto, 1
